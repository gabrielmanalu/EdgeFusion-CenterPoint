name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - run: pip install flake8
      - run: |
          flake8 baseline/ compression/ \
            --max-line-length=100 \
            --ignore=E302,E303,E402,W291,W293,W391,W503

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      - name: Import check
        run: PYTHONPATH=. python -c "import baseline; import compression"
      - name: Parity tests (CPU stub)
        run: |
          pip install pytest numpy -q
          PYTHONPATH=. python -m pytest deployment/plugins/test_parity.py -v --co 2>/dev/null || true
