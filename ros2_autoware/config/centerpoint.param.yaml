/**:
  ros__parameters:
    # Engine paths — relative to the container mount point.
    # Host:      deployment/output/engines/
    # Container: /workspace/engines/  (mounted via -v flag)
    encoder_engine_path:  "/workspace/engines/qat_best/pts_voxel_encoder.engine"
    backbone_engine_path: "/workspace/engines/qat_best/pts_backbone_neck_head.engine"
    postproc_so_path:     "/workspace/plugins/libcenter_head_postprocess.so"

    # Detection thresholds
    score_threshold: 0.35
    nms_radius:      2.0
    max_detections:  500

    # Voxelizer — nuScenes CenterPoint pillar02
    point_cloud_range:     [-51.2, -51.2, -5.0, 51.2, 51.2, 3.0]
    voxel_size:            [0.2, 0.2, 8.0]
    max_num_voxels:        30000
    max_points_per_voxel:  32

    # Topics
    sub_topic: "/sensing/lidar/top/pointcloud_raw_ex"
    pub_topic: "/perception/object_recognition/detection/objects"