# docker-compose.yml
# Run from the repo root:
#   docker compose -f ros2_autoware/docker/docker-compose.yml run --rm colcon-build
#   docker compose -f ros2_autoware/docker/docker-compose.yml run --rm node

services:

  # Build the ROS 2 package inside the container image.
  # Named 'colcon-build' to avoid shadowing the YAML 'build:' key.
  colcon-build:
    image: edge_fusion_ros2:latest
    build:
      context: ../..
      dockerfile: ros2_autoware/docker/Dockerfile
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - ../../deployment/output/engines:/workspace/engines:ro
      - ../../deployment/plugins:/workspace/plugins:ro
    environment:
      - ROS_DOMAIN_ID=42
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /opt/aw_msgs_ws/install/setup.bash &&
        cd /ros2_ws &&
        colcon build
          --packages-select edge_fusion_centerpoint
          --cmake-args
            -DCMAKE_BUILD_TYPE=Release
            -DPOSTPROC_HEADER_DIR=/workspace/plugins &&
        echo '[colcon-build] SUCCESS — run: docker compose ... run --rm node'"

  # Run the detection node.
  node:
    image: edge_fusion_ros2:latest
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - ../../deployment/output/engines:/workspace/engines:ro
      - ../../deployment/plugins:/workspace/plugins:ro
    environment:
      - ROS_DOMAIN_ID=42
      - RCUTILS_COLORIZED_OUTPUT=1
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /opt/aw_msgs_ws/install/setup.bash &&
        source /ros2_ws/install/setup.bash &&
        ros2 launch edge_fusion_centerpoint centerpoint.launch.xml
          encoder_engine:=/workspace/engines/qat_best/pts_voxel_encoder.engine
          backbone_engine:=/workspace/engines/qat_best/pts_backbone_neck_head.engine
          postproc_so:=/workspace/plugins/libcenter_head_postprocess.so"

  # rosbag replay
  replay:
    image: edge_fusion_ros2:latest
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - ../../deployment/output/engines:/workspace/engines:ro
    environment:
      - ROS_DOMAIN_ID=42
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        ros2 bag play /workspace/data/bags/nuscenes_sample.mcap
          --rate 1.0 --loop"

  # Echo published detections for debugging
  echo-dets:
    image: edge_fusion_ros2:latest
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=42
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        ros2 topic echo
          /perception/object_recognition/detection/objects
          --field objects"